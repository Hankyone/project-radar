<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Radar</title>
  <style>
    :root { color-scheme: light dark; --bg:#0b0d12; --card:#151923; --muted:#9aa4b2; --text:#f2f5f8; --line:#252b38; --accent:#8ab4ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    main { max-width: 1080px; margin: 0 auto; padding: 40px 20px; }
    header { display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:28px; }
    h1 { margin:0; font-size: clamp(34px, 5vw, 64px); letter-spacing:-0.06em; line-height:0.9; }
    .meta { color:var(--muted); text-align:right; font-size:14px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
    button { border:1px solid var(--line); background:var(--card); color:var(--text); padding:8px 11px; border-radius:999px; cursor:pointer; text-transform:capitalize; }
    button.active { border-color:var(--accent); color:var(--accent); }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
    .card { border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)); border-radius:18px; padding:18px; min-height:180px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    h2 { margin:0; font-size:22px; letter-spacing:-0.03em; }
    .badge { border:1px solid var(--line); border-radius:999px; padding:4px 8px; color:var(--muted); font-size:12px; white-space:nowrap; text-transform:capitalize; }
    p { color:var(--muted); line-height:1.45; }
    dl { margin:16px 0 0; display:grid; gap:10px; }
    dt { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    dd { margin:2px 0 0; }
    a { color:var(--accent); text-decoration:none; }
    .tags, .links { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
    .tag, .link { color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:3px 7px; font-size:12px; }
    .link { color:var(--accent); }
    .empty { color:var(--muted); border:1px dashed var(--line); border-radius:18px; padding:24px; }
    @media (max-width: 640px) { header { display:block; } .meta { text-align:left; margin-top:16px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Project Radar</h1>
        <p>Public-safe tracker for prototypes, maintained apps, paused work, and archived projects.</p>
      </div>
      <div class="meta" id="meta">Loading…</div>
    </header>
    <div class="controls" id="controls"></div>
    <section class="grid" id="projects"></section>
  </main>
  <script>
    let selected = "all";
    let state = null;

    function esc(value) {
      return String(value ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    }

    function statusLabel(id) {
      return state?.status_options?.find(s => s.id === id)?.label || id;
    }

    function renderControls() {
      const statuses = [
        { id: "all", label: "All" },
        ...(state?.status_options || [])
      ];
      const el = document.getElementById("controls");
      el.innerHTML = statuses.map(s => `<button class="${s.id === selected ? "active" : ""}" data-status="${esc(s.id)}">${esc(s.label)}</button>`).join("");
      el.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => { selected = button.dataset.status; render(); });
      });
    }

    function render() {
      renderControls();
      const all = state?.projects || [];
      const projects = all.filter(p => selected === "all" || p.status === selected);
      document.getElementById("meta").innerHTML = `Updated ${esc(state?.updated_at || "unknown")}<br>${projects.length} visible / ${all.length} total`;
      const grid = document.getElementById("projects");
      if (!projects.length) {
        grid.innerHTML = `<div class="empty">No projects in this view.</div>`;
        return;
      }
      grid.innerHTML = projects.map(p => `
        <article class="card">
          <div class="top">
            <h2>${esc(p.name)}</h2>
            <span class="badge">${esc(statusLabel(p.status))}</span>
          </div>
          <p>${esc(p.summary)}</p>
          <dl>
            <div><dt>Last touched</dt><dd>${esc(p.last_touched)}</dd></div>
            ${p.notes ? `<div><dt>Notes</dt><dd>${esc(p.notes)}</dd></div>` : ""}
          </dl>
          <div class="tags">${(p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>
          <div class="links">${(p.links || []).map(l => `<a class="link" href="${esc(l.url)}" rel="noopener noreferrer">${esc(l.label)}</a>`).join("")}</div>
        </article>
      `).join("");
    }

    fetch("projects.json", { cache: "no-store" })
      .then(r => r.json())
      .then(json => { state = json; render(); })
      .catch(err => {
        document.getElementById("meta").textContent = "Failed to load projects.json";
        document.getElementById("projects").innerHTML = `<div class="empty">${esc(err.message)}</div>`;
      });
  </script>
</body>
</html>
